<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoftDesk Explosion</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent !important;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        cursor: none;
      }
      #explosion-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="explosion-canvas"></canvas>
    <script type="module">
      const canvas = document.getElementById('explosion-canvas');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;

      function resize() {
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      window.addEventListener('resize', resize);
      resize();

      let animId = null;

      // Logo 色系（增强饱和度与亮度）
      const PALETTE = [
        [255, 255, 255],
        [255, 240, 100],
        [255, 200, 50],
        [255, 140, 0],
        [255, 50, 120],
        [220, 60, 255],
        [160, 40, 255],
        [100, 30, 255],
        [0, 200, 255],
        [50, 255, 150],
      ];

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function easeOutQuad(t) {
        return 1 - (1 - t) * (1 - t);
      }

      /**
       * 在指定坐标播放粒子爆炸效果
       * @param {number} cx - 窗口内中心 X
       * @param {number} cy - 窗口内中心 Y
       * @param {number} durationMs - 动画时长(默认 500ms)
       */
      function explodeAt(cx, cy, durationMs = 700) {
        if (animId) cancelAnimationFrame(animId);

        const PARTICLE_COUNT = 96;
        const FLASH_DURATION = durationMs * 0.15;
        const SHOCKWAVE_DURATION = durationMs * 0.35;
        const PARTICLE_DURATION = durationMs;

        // 生成粒子
        const particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const angle = (Math.PI * 2 * i) / PARTICLE_COUNT + (Math.random() - 0.5) * 0.8;
          const speed = 160 + Math.random() * 440;
          const size = 4 + Math.random() * 12;
          const color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
          particles.push({
            angle,
            speed,
            size,
            color,
            decay: 0.3 + Math.random() * 0.4,
          });
        }

        const startTime = performance.now();

        function draw() {
          ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
          const elapsed = performance.now() - startTime;
          const t = Math.min(1, elapsed / durationMs);

          if (t >= 1) {
            animId = null;
            return;
          }

          // 1) 中心闪光(前 15%)
          if (elapsed < FLASH_DURATION) {
            const ft = elapsed / FLASH_DURATION;
            const flashRadius = 60 + 160 * easeOutCubic(ft);
            const flashAlpha = (1 - ft) * 1.0;
            const flashGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, flashRadius);
            flashGrad.addColorStop(0, `rgba(255, 255, 255, ${flashAlpha})`);
            flashGrad.addColorStop(0.3, `rgba(255, 240, 180, ${flashAlpha * 0.8})`);
            flashGrad.addColorStop(1, `rgba(255, 200, 100, 0)`);
            ctx.fillStyle = flashGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, flashRadius, 0, Math.PI * 2);
            ctx.fill();
          }

          // 2) 冲击波环(前 35%)
          if (elapsed < SHOCKWAVE_DURATION) {
            const st = elapsed / SHOCKWAVE_DURATION;
            const ringRadius = 40 + 280 * easeOutCubic(st);
            const ringAlpha = (1 - st) * 0.8;
            const ringWidth = 6 + 16 * (1 - st);
            ctx.strokeStyle = `rgba(255, 200, 120, ${ringAlpha})`;
            ctx.lineWidth = ringWidth;
            ctx.beginPath();
            ctx.arc(cx, cy, ringRadius, 0, Math.PI * 2);
            ctx.stroke();

            // 内环
            const innerRadius = 20 + 160 * easeOutCubic(st);
            const innerAlpha = (1 - st) * 0.6;
            ctx.strokeStyle = `rgba(255, 50, 120, ${innerAlpha})`;
            ctx.lineWidth = ringWidth * 0.6;
            ctx.beginPath();
            ctx.arc(cx, cy, innerRadius, 0, Math.PI * 2);
            ctx.stroke();
          }

          // 3) 粒子飞散
          for (const p of particles) {
            const pt = Math.min(1, elapsed / (PARTICLE_DURATION * p.decay));
            if (pt >= 1) continue;

            const distance = p.speed * easeOutCubic(pt);
            const px = cx + Math.cos(p.angle) * distance;
            const py = cy + Math.sin(p.angle) * distance;

            const alpha = 1 - easeOutQuad(pt);
            const currentSize = p.size * (1 - pt * 0.6);

            const [r, g, b] = p.color;
            const grad = ctx.createRadialGradient(px, py, 0, px, py, currentSize * 1.5);
            grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha})`);
            grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(px, py, currentSize * 1.5, 0, Math.PI * 2);
            ctx.fill();
          }

          // 4) 中心残留光球(持续缩小)
          const coreT = Math.min(1, elapsed / (durationMs * 0.6));
          const coreRadius = 50 * (1 - coreT);
          const coreAlpha = (1 - coreT) * 0.9;
          if (coreRadius > 0) {
            const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreRadius);
            coreGrad.addColorStop(0, `rgba(255, 255, 255, ${coreAlpha})`);
            coreGrad.addColorStop(0.5, `rgba(255, 200, 100, ${coreAlpha * 0.7})`);
            coreGrad.addColorStop(1, `rgba(255, 50, 120, 0)`);
            ctx.fillStyle = coreGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, coreRadius, 0, Math.PI * 2);
            ctx.fill();
          }

          animId = requestAnimationFrame(draw);
        }

        draw();
      }

      function stop() {
        if (animId) {
          cancelAnimationFrame(animId);
          animId = null;
        }
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }

      window.__animation = { explodeAt, stop };
    </script>
  </body>
</html>
