name: Build macOS Installer

# 手动或 push 到指定分支时，在 macos-latest runner 上出 dmg + zip 安装包，
# 并把产物作为 artifact 上传。适合快速验证 Mac 端构建产物，或在没有
# Xcode / 证书环境的机器上也能拿到可分发的 dmg。
#
# 使用方式：
#   GitHub → Actions → Build macOS Installer → Run workflow
#   完成后在 Summary 页点击 "softdesk-mac-installer" artifact 下载。

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - "package.json"
      - "package-lock.json"
      - "electron/**"
      - "src/**"
      - "build/**"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/build-mac.yml"

permissions:
  contents: read

concurrency:
  group: build-mac-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-mac
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set timezone to Beijing
        run: |
          sudo systemsetup -settimezone "Asia/Shanghai"
          date

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Package macOS installer (dmg + zip)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run dist:mac

      - name: List build output
        run: |
          echo "=== release directory ==="
          ls -lah release || true

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: softdesk-mac-installer
          # 只挑最终发布需要的文件，避免把 mac/ 子目录也塞进去。
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error
          retention-days: 14
