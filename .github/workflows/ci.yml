name: CI

# PR 与 main 分支推送时同时在 macOS 与 Windows runner 上验证：
# lint / typecheck / test / build 全部双端通过才算 CI 绿。
# 分支保护规则里把 verify (macos-latest) 与 verify (windows-latest)
# 都列为 required checks，即可强制拦截"只在一端能编译"的 PR。

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - "feature/*"

concurrency:
  # 同一分支的多次 push 只保留最新一次运行，节省 Actions 分钟数。
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # postinstall 里的 electron-builder install-app-deps 会自动为当前
        # 平台重编译 better-sqlite3 / uiohook-napi 等 native 模块。
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build (vite + tsc)
        env:
          # Vite 需要在构建期就读到这两个变量，否则 renderer bundle 里
          # supabase 客户端会被建成 null，UI 展示“Supabase 未配置”。
          # 值来自仓库 Settings → Secrets and variables → Actions。
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
